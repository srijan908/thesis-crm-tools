<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Order Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f11; --surface: #1a1a1f; --surface2: #232329;
      --border: #2e2e36; --accent: #c9f542; --accent-dim: #a8cc2a;
      --text: #f0f0f0; --text-muted: #7a7a8a; --danger: #ff5c5c;
      --paid: #4ade80; --pending: #facc15; --radius: 14px;
    }
    body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 24px;
      background-image:
        radial-gradient(ellipse 60% 50% at 20% 10%, rgba(201,245,66,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 90% 90%, rgba(201,245,66,0.04) 0%, transparent 60%); }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
      width: 100%; max-width: 500px; padding: 40px; box-shadow: 0 24px 80px rgba(0,0,0,0.5);
      animation: rise 0.5s cubic-bezier(0.16,1,0.3,1) both; }
    @keyframes rise { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .badge { display:inline-flex; align-items:center; gap:6px;
      background:rgba(201,245,66,0.1); border:1px solid rgba(201,245,66,0.2);
      color:var(--accent); font-size:11px; font-weight:600; letter-spacing:0.08em;
      text-transform:uppercase; padding:4px 10px; border-radius:100px; margin-bottom:14px; }
    .badge::before { content:''; width:6px; height:6px; background:var(--accent); border-radius:50%; }
    h1 { font-size:26px; font-weight:700; letter-spacing:-0.02em; line-height:1.2; }
    h1 span { color:var(--accent); }
    .subtitle { margin-top:6px; font-size:13px; color:var(--text-muted); font-weight:300; }
    .divider { height:1px; background:var(--border); margin:28px 0; }
    .field { margin-bottom:20px; }
    label { display:block; font-size:12px; font-weight:600; letter-spacing:0.06em;
      text-transform:uppercase; color:var(--text-muted); margin-bottom:8px; }
    input[type="tel"] { width:100%; background:var(--surface2); border:1.5px solid var(--border);
      border-radius:var(--radius); color:var(--text); font-family:'JetBrains Mono',monospace;
      font-size:18px; font-weight:500; padding:14px 16px; outline:none;
      transition:border-color 0.2s,box-shadow 0.2s; }
    input[type="tel"]::placeholder { color:var(--text-muted); font-size:15px; }
    input[type="tel"]:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(201,245,66,0.12); }
    .btn { width:100%; padding:15px; background:var(--accent); color:#0f0f11;
      border:none; border-radius:var(--radius); font-family:'Sora',sans-serif; font-size:14px;
      font-weight:700; letter-spacing:0.02em; cursor:pointer;
      transition:background 0.2s,transform 0.1s,box-shadow 0.2s; }
    .btn:hover { background:var(--accent-dim); box-shadow:0 6px 24px rgba(201,245,66,0.25); }
    .btn:active { transform:scale(0.98); }
    .btn:disabled { opacity:0.5; cursor:not-allowed; }
    .error-box { background:rgba(255,92,92,0.1); border:1px solid rgba(255,92,92,0.3);
      border-radius:10px; padding:14px 16px; font-size:13px; color:var(--danger);
      display:none; margin-top:16px; text-align:center; }
    .error-box.show { display:block; }

    /* Results */
    .results { margin-top:28px; display:none; animation:rise 0.4s cubic-bezier(0.16,1,0.3,1) both; }
    .results.show { display:block; }
    .client-header { display:flex; align-items:flex-start; justify-content:space-between;
      gap:12px; margin-bottom:20px; }
    .client-name { font-size:22px; font-weight:700; letter-spacing:-0.01em; }
    .ticket-id { font-family:'JetBrains Mono',monospace; font-size:11px;
      color:var(--text-muted); margin-top:4px; }
    .status-pill { flex-shrink:0; padding:6px 14px; border-radius:100px;
      font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; }
    .status-intake    { background:rgba(96,165,250,0.15); color:#60a5fa; }
    .status-progress  { background:rgba(250,204,21,0.15); color:#facc15; }
    .status-review    { background:rgba(251,146,60,0.15); color:#fb923c; }
    .status-revision  { background:rgba(255,92,92,0.15); color:#ff5c5c; }
    .status-delivered { background:rgba(74,222,128,0.15); color:#4ade80; }
    .status-closed    { background:rgba(148,163,184,0.15); color:#94a3b8; }

    .thesis-box { background:var(--surface2); border:1px solid var(--border);
      border-radius:10px; padding:14px 16px; font-size:13px;
      color:var(--text-muted); line-height:1.6; margin-bottom:20px; }
    .thesis-box strong { display:block; font-size:11px; font-weight:600;
      letter-spacing:0.06em; text-transform:uppercase; color:var(--text-muted);
      margin-bottom:6px; }

    .section-label { font-size:11px; font-weight:600; letter-spacing:0.06em;
      text-transform:uppercase; color:var(--accent); margin-bottom:12px; }
    .milestone-row { display:flex; align-items:center; justify-content:space-between;
      padding:14px 0; border-bottom:1px solid var(--border); gap:12px; }
    .milestone-row:last-child { border-bottom:none; }
    .milestone-name { font-size:14px; font-weight:600; }
    .milestone-amount { font-family:'JetBrains Mono',monospace; font-size:13px;
      color:var(--text-muted); margin-top:2px; }
    .milestone-badge { flex-shrink:0; padding:4px 12px; border-radius:100px;
      font-size:11px; font-weight:700; letter-spacing:0.04em; }
    .badge-paid    { background:rgba(74,222,128,0.15); color:var(--paid); }
    .badge-pending { background:rgba(250,204,21,0.12); color:var(--pending); }

    .summary-section { margin-top:20px; background:var(--surface2);
      border:1px solid var(--border); border-radius:12px; padding:16px; }
    .summary-row { display:flex; justify-content:space-between;
      font-size:13px; margin-bottom:8px; }
    .summary-row:last-child { margin-bottom:0; padding-top:8px;
      border-top:1px solid var(--border); }
    .summary-row span:first-child { color:var(--text-muted); }
    .summary-row span:last-child { font-family:'JetBrains Mono',monospace; font-weight:600; }
    .summary-row.remaining span:last-child { color:var(--accent); }

    .reset-link { display:block; text-align:center; margin-top:20px;
      font-size:12px; color:var(--text-muted); cursor:pointer;
      text-decoration:underline; text-underline-offset:3px;
      background:none; border:none; font-family:'Sora',sans-serif;
      transition:color 0.2s; }
    .reset-link:hover { color:var(--text); }
    .footer { margin-top:28px; text-align:center; font-size:11px; color:var(--text-muted); }
  </style>
</head>
<body>
  <!-- ⚙️ CONFIG: Replace with your deployed Worker URL after running `wrangler deploy` -->
  <script>const WORKER_URL = 'https://thesis-crm-worker.YOUR_CF_SUBDOMAIN.workers.dev';</script>

  <div class="card">
    <div>
      <div class="badge">Client Portal</div>
      <h1>Order <span>Tracker</span></h1>
      <p class="subtitle">Enter your registered phone number to check your order status.</p>
    </div>
    <div class="divider"></div>
    <div class="field">
      <label>Phone Number</label>
      <input type="tel" id="phone" placeholder="Enter your phone number" />
    </div>
    <button class="btn" id="search-btn" onclick="lookup()">Check Status →</button>
    <div class="error-box" id="error-box"></div>

    <div class="results" id="results">
      <div class="divider"></div>
      <div class="client-header">
        <div>
          <div class="client-name" id="res-name"></div>
          <div class="ticket-id" id="res-ticket-id"></div>
        </div>
        <div class="status-pill" id="res-status"></div>
      </div>
      <div class="thesis-box">
        <strong>Thesis Details</strong>
        <span id="res-thesis"></span>
      </div>
      <div class="section-label">Payment Milestones</div>
      <div id="milestones-list"></div>
      <div class="summary-section">
        <div class="summary-row"><span>Total Paid</span><span id="res-paid"></span></div>
        <div class="summary-row remaining"><span>Balance Due</span><span id="res-balance"></span></div>
      </div>
      <button class="reset-link" onclick="reset()">← Search again</button>
    </div>
    <div class="footer">Thesis Research CRM · For client use</div>
  </div>

  <script>
    const STATUS_LABELS = {
      'Intake':      { label: 'Order Received',        cls: 'status-intake' },
      'In Progress': { label: 'Work in Progress',      cls: 'status-progress' },
      'Review':      { label: 'Under Review',          cls: 'status-review' },
      'Revision':    { label: 'Revisions in Progress', cls: 'status-revision' },
      'Delivered':   { label: 'Delivered ✓',           cls: 'status-delivered' },
      'Closed':      { label: 'Completed ✓',           cls: 'status-closed' },
    };

    function fmt(n) { return '₹' + Number(n || 0).toLocaleString('en-IN'); }

    async function lookup() {
      const phone = document.getElementById('phone').value.trim();
      const errorBox = document.getElementById('error-box');
      const btn = document.getElementById('search-btn');

      errorBox.classList.remove('show');
      document.getElementById('results').classList.remove('show');

      if (!phone) {
        errorBox.textContent = 'Please enter your phone number.';
        errorBox.classList.add('show');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Searching...';

      try {
        const res = await fetch(`${WORKER_URL}/lookup?phone=${encodeURIComponent(phone)}`);
        const data = await res.json();

        if (!res.ok) throw new Error(data.error || 'Something went wrong');

        if (!data.found) {
          errorBox.textContent = 'No order found for this phone number. Please check and try again.';
          errorBox.classList.add('show');
          return;
        }

        renderResults(data);
      } catch (err) {
        errorBox.textContent = '⚠ ' + err.message;
        errorBox.classList.add('show');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Check Status →';
      }
    }

    function renderResults({ ticket, payments }) {
      document.getElementById('res-name').textContent = ticket.clientName || 'Client';
      document.getElementById('res-ticket-id').textContent = `Order #${ticket.id}`;
      document.getElementById('res-thesis').textContent = ticket.thesisDetails || '—';
      document.getElementById('res-paid').textContent = fmt(ticket.totalPaid);
      document.getElementById('res-balance').textContent = fmt(ticket.remainingBalance);

      const statusEl = document.getElementById('res-status');
      const statusInfo = STATUS_LABELS[ticket.orderStatus] || { label: ticket.orderStatus || 'Unknown', cls: 'status-intake' };
      statusEl.textContent = statusInfo.label;
      statusEl.className = 'status-pill ' + statusInfo.cls;

      const milestoneOrder = ['Advance', 'Midway', 'Final'];
      const sorted = [...payments].sort((a, b) =>
        milestoneOrder.indexOf(a.milestone) - milestoneOrder.indexOf(b.milestone)
      );

      const list = document.getElementById('milestones-list');
      list.innerHTML = sorted.length === 0
        ? '<p style="font-size:13px;color:var(--text-muted);padding:12px 0;">No payment records yet.</p>'
        : sorted.map(p => `
          <div class="milestone-row">
            <div>
              <div class="milestone-name">${p.milestone || '—'}</div>
              <div class="milestone-amount">${fmt(p.amount)}</div>
            </div>
            <div class="milestone-badge ${p.status === 'Paid' ? 'badge-paid' : 'badge-pending'}">
              ${p.status || 'Pending'}
            </div>
          </div>`).join('');

      document.getElementById('results').classList.add('show');
      document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function reset() {
      document.getElementById('phone').value = '';
      document.getElementById('results').classList.remove('show');
      document.getElementById('error-box').classList.remove('show');
    }

    document.getElementById('phone').addEventListener('keydown', e => {
      if (e.key === 'Enter') lookup();
    });
  </script>
</body>
</html>
