<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Order Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f5f7;
      --card: #ffffff;
      --border: #e0e0e5;
      --accent: #0071e3;
      --accent-light: #e8f1fb;
      --text: #1d1d1f;
      --muted: #6e6e73;
      --green-bg: #e8f8ee;
      --green-fg: #1a7f3c;
      --amber-bg: #fff3e0;
      --amber-fg: #b85c00;
      --red: #ff3b30;
      --r: 18px;
      --rs: 10px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 16px 60px;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 580px; margin: 0 auto; }

    /* ── Header ── */
    .hdr { text-align: center; margin-bottom: 28px; }
    .hdr-eyebrow { font-size: 12px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
    .hdr h1 { font-size: 28px; font-weight: 700; letter-spacing: -.02em; }
    .hdr .sub { font-size: 14px; color: var(--muted); margin-top: 4px; }

    /* ── Card ── */
    .card { background: var(--card); border-radius: var(--r); padding: 22px; margin-bottom: 14px; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
    .card-label { font-size: 11px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }

    /* ── Stage timeline ── */
    .timeline { display: flex; align-items: flex-start; overflow-x: auto; padding-bottom: 2px; }
    .tl-item { display: flex; flex-direction: column; align-items: center; flex: 1; min-width: 64px; }
    .tl-track { display: flex; align-items: center; width: 100%; }
    .tl-line { flex: 1; height: 2px; background: var(--border); transition: background .3s; }
    .tl-line.done { background: var(--accent); }
    .tl-dot { width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0; border: 2px solid var(--border); background: var(--card); position: relative; z-index: 1; transition: all .3s; }
    .tl-dot.done { background: var(--accent); border-color: var(--accent); }
    .tl-dot.done::after { content: '✓'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #fff; }
    .tl-dot.current { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-light); }
    .tl-dot.current::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 7px; height: 7px; background: #fff; border-radius: 50%; }
    .tl-label { font-size: 10px; font-weight: 500; color: var(--muted); text-align: center; margin-top: 8px; line-height: 1.3; padding: 0 2px; }
    .tl-label.active { color: var(--accent); font-weight: 600; }

    /* ── Info rows ── */
    .info-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid var(--border); gap: 16px; }
    .info-row:last-child { border-bottom: none; }
    .info-key { font-size: 13px; color: var(--muted); flex-shrink: 0; }
    .info-val { font-size: 13px; font-weight: 500; text-align: right; line-height: 1.5; }

    /* ── Payment rows ── */
    .pay-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); gap: 12px; }
    .pay-row:last-child { border-bottom: none; }
    .pay-name { font-size: 14px; font-weight: 500; }
    .pay-amt  { font-size: 13px; color: var(--muted); margin-top: 2px; font-variant-numeric: tabular-nums; }
    .pill { padding: 4px 10px; border-radius: 100px; font-size: 11px; font-weight: 600; flex-shrink: 0; }
    .pill-paid    { background: var(--green-bg); color: var(--green-fg); }
    .pill-pending { background: var(--amber-bg); color: var(--amber-fg); }

    /* ── Balance ── */
    .bal-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; }
    .bal-row.total { padding-top: 12px; border-top: 1px solid var(--border); margin-top: 4px; }
    .bal-row .lbl { font-size: 13px; color: var(--muted); }
    .bal-row .amt { font-size: 14px; font-weight: 600; font-variant-numeric: tabular-nums; }
    .bal-row.total .amt { font-size: 16px; color: var(--accent); }

    /* ── Comments ── */
    .comment { padding: 12px 0; border-bottom: 1px solid var(--border); }
    .comment:last-of-type { border-bottom: none; }
    .c-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
    .c-author { font-size: 12px; font-weight: 600; }
    .c-author.team { color: var(--accent); }
    .c-author.customer { color: var(--muted); }
    .c-time { font-size: 11px; color: var(--muted); }
    .c-text { font-size: 14px; line-height: 1.55; white-space: pre-wrap; }
    .no-comments { font-size: 13px; color: var(--muted); text-align: center; padding: 20px 0; }

    /* ── Comment input ── */
    .c-input-wrap { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
    textarea { width: 100%; border: 1.5px solid var(--border); border-radius: var(--rs); padding: 11px 13px; font-family: inherit; font-size: 14px; color: var(--text); background: var(--bg); resize: none; outline: none; transition: border-color .2s; line-height: 1.5; }
    textarea:focus { border-color: var(--accent); background: #fff; }
    .btn { display: block; width: 100%; margin-top: 10px; padding: 13px; background: var(--accent); color: #fff; border: none; border-radius: var(--rs); font-family: inherit; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity .2s; }
    .btn:hover { opacity: .87; }
    .btn:disabled { opacity: .45; cursor: not-allowed; }

    /* ── Loading / error ── */
    .loading { text-align: center; padding: 80px 24px; color: var(--muted); font-size: 15px; }
    .err-card { background: #fff2f2; border-radius: var(--r); padding: 40px 24px; text-align: center; }
    .err-card h2 { font-size: 18px; color: var(--red); margin-bottom: 8px; }
    .err-card p { font-size: 14px; color: var(--muted); line-height: 1.6; }

    /* ── Toast ── */
    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: #1d1d1f; color: #fff; padding: 11px 20px; border-radius: 100px; font-size: 13px; font-weight: 500; opacity: 0; transition: opacity .25s; pointer-events: none; white-space: nowrap; z-index: 100; }
    .toast.show { opacity: 1; }

    .hidden { display: none; }

    @media (max-width: 380px) {
      .tl-label { font-size: 9px; }
      .tl-dot   { width: 16px; height: 16px; }
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-eyebrow">Client Portal</div>
    <h1 id="hdr-name">Loading…</h1>
    <div class="sub" id="hdr-id"></div>
  </div>

  <div id="view-loading" class="loading">Fetching your order…</div>

  <div id="view-error" class="err-card hidden">
    <h2>Link not found</h2>
    <p>This tracker link is invalid or has expired.<br>Please contact us for assistance.</p>
  </div>

  <div id="view-main" class="hidden">

    <!-- Stage timeline -->
    <div class="card">
      <div class="card-label">Order Progress</div>
      <div class="timeline" id="timeline"></div>
    </div>

    <!-- Thesis details -->
    <div class="card">
      <div class="card-label">Thesis Details</div>
      <p id="thesis-text" style="font-size:14px;line-height:1.65;color:var(--muted);"></p>
    </div>

    <!-- Payments -->
    <div class="card">
      <div class="card-label">Payments</div>
      <div id="pay-list"></div>
      <div style="margin-top:14px;">
        <div class="bal-row"><span class="lbl">Total Paid</span><span class="amt" id="bal-paid"></span></div>
        <div class="bal-row total"><span class="lbl">Balance Due</span><span class="amt" id="bal-due"></span></div>
      </div>
    </div>

    <!-- Comments -->
    <div class="card">
      <div class="card-label">Updates &amp; Messages</div>
      <div id="c-list"></div>
      <div class="c-input-wrap">
        <textarea id="c-input" rows="3" placeholder="Send a message to the team… (Enter to send)"></textarea>
        <button class="btn" id="c-btn" onclick="postComment()">Send Message</button>
      </div>
    </div>

  </div><!-- /view-main -->
</div><!-- /wrap -->

<div class="toast" id="toast"></div>

<script>
const WORKER = 'https://thesis-crm-worker.srijancrm.workers.dev';
const TOKEN  = new URLSearchParams(location.search).get('token');

const STAGES = [
  { key: 'Intake',      label: 'Received'   },
  { key: 'Introduction and Literature Review', label: 'Introduction and Literature Review' },
  { key: 'Data Analysis and Results',      label: 'Data Analysis and Results'      },
  { key: 'Discussion Conclusion Summary',  label: 'Discussion Conclusion Summary'      },
  { key: 'Revision',    label: 'Revision'    },
  { key: 'Delivered',   label: 'Delivered'   },
  { key: 'Closed',      label: 'Complete'    },
];

let clientName = '';

function fmt(n) { return '₹' + Number(n || 0).toLocaleString('en-IN'); }

function timeAgo(ts) {
  const m = Math.floor((Date.now() - new Date(ts)) / 60000);
  if (m < 1)  return 'just now';
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  return new Date(ts).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function renderTimeline(status) {
  const cur = STAGES.findIndex(s => s.key === status);
  document.getElementById('timeline').innerHTML = STAGES.map((s, i) => `
    <div class="tl-item">
      <div class="tl-track">
        ${i > 0 ? `<div class="tl-line ${i <= cur ? 'done' : ''}"></div>` : ''}
        <div class="tl-dot ${i < cur ? 'done' : i === cur ? 'current' : ''}"></div>
        ${i < STAGES.length - 1 ? `<div class="tl-line ${i < cur ? 'done' : ''}"></div>` : ''}
      </div>
      <div class="tl-label ${i === cur ? 'active' : ''}">${s.label}</div>
    </div>`).join('');
}

function renderPayments(payments) {
  const order = ['Advance', 'Midway', 'Final'];
  const sorted = [...payments].sort((a, b) => order.indexOf(a.milestone) - order.indexOf(b.milestone));
  document.getElementById('pay-list').innerHTML = sorted.length
    ? sorted.map(p => `
        <div class="pay-row">
          <div>
            <div class="pay-name">${p.milestone || '—'}</div>
            <div class="pay-amt">${fmt(p.amount)}</div>
          </div>
          <div class="pill ${p.status === 'Paid' ? 'pill-paid' : 'pill-pending'}">${p.status || 'Pending'}</div>
        </div>`).join('')
    : '<p style="font-size:13px;color:var(--muted);padding:8px 0;">No payments recorded yet.</p>';
}

function renderComments(comments) {
  const el = document.getElementById('c-list');
  if (!comments.length) {
    el.innerHTML = '<p class="no-comments">No messages yet — send one below!</p>';
    return;
  }
  el.innerHTML = comments.map(c => `
    <div class="comment">
      <div class="c-meta">
        <span class="c-author ${c.isTeam ? 'team' : 'customer'}">${c.isTeam ? '● Team' : c.author}</span>
        <span class="c-time">${timeAgo(c.timestamp)}</span>
      </div>
      <div class="c-text">${c.message.replace(/</g,'&lt;')}</div>
    </div>`).join('');
}

async function postComment() {
  const input = document.getElementById('c-input');
  const btn   = document.getElementById('c-btn');
  const msg   = input.value.trim();
  if (!msg) return;

  btn.disabled = true; btn.textContent = 'Sending…';
  try {
    const res  = await fetch(`${WORKER}/ticket/comment`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: TOKEN, message: msg, clientName }),
    });
    const data = await res.json();
    if (data.success) {
      input.value = '';
      toast('Message sent!');
      const cr = await fetch(`${WORKER}/ticket/comments?token=${TOKEN}`).then(r => r.json());
      renderComments(cr.comments || []);
    } else { toast('Could not send. Try again.'); }
  } catch { toast('Something went wrong.'); }
  finally { btn.disabled = false; btn.textContent = 'Send Message'; }
}

async function init() {
  if (!TOKEN) {
    document.getElementById('view-loading').classList.add('hidden');
    document.getElementById('view-error').classList.remove('hidden');
    return;
  }
  try {
    const [tr, cr] = await Promise.all([
      fetch(`${WORKER}/ticket?token=${TOKEN}`).then(r => r.json()),
      fetch(`${WORKER}/ticket/comments?token=${TOKEN}`).then(r => r.json()),
    ]);
    if (!tr.ticket) throw new Error();

    const { ticket, payments } = tr;
    clientName = ticket.clientName || 'Customer';

    document.getElementById('hdr-name').textContent = ticket.clientName;
    document.getElementById('hdr-id').textContent   = `Order #${ticket.id}`;
    document.getElementById('thesis-text').textContent = ticket.thesisDetails || '—';
    document.getElementById('bal-paid').textContent  = fmt(ticket.totalPaid);
    document.getElementById('bal-due').textContent   = fmt(ticket.remainingBalance);

    renderTimeline(ticket.orderStatus);
    renderPayments(payments);
    renderComments(cr.comments || []);

    document.getElementById('view-loading').classList.add('hidden');
    document.getElementById('view-main').classList.remove('hidden');
  } catch {
    document.getElementById('view-loading').classList.add('hidden');
    document.getElementById('view-error').classList.remove('hidden');
  }
}

document.getElementById('c-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); postComment(); }
});

init();
</script>
</body>
</html>
